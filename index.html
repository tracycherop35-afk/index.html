<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>C++ Practical Exam 3</title>
    <style>
        :root {
            --bg: #f0f4f8;
            --card-bg: #ffffff;
            --primary: #4f6ef7;
            --primary-hover: #3b54e0;
            --success: #22c55e;
            --danger: #ef4444;
            --warning: #f59e0b;
            --text: #1e293b;
            --text-light: #64748b;
            --border: #e2e8f0;
            --radius: 16px;
            --transition: 0.2s ease;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--bg); color: var(--text);
            min-height: 100vh; display: flex; align-items: center; justify-content: center;
            padding: 20px;
        }
        .screen { width: 100%; display: flex; justify-content: center; align-items: center; }
        .card {
            background: var(--card-bg); border-radius: var(--radius);
            box-shadow: 0 4px 24px rgba(0,0,0,0.08); padding: 40px;
            text-align: center; width: 100%; max-width: 500px;
        }
        .form-group { margin-bottom: 16px; text-align: left; }
        .form-group label { font-weight: 600; display: block; margin-bottom: 4px; }
        .form-group input {
            width: 100%; padding: 10px; border: 2px solid var(--border);
            border-radius: 8px; font-size: 1rem;
        }
        .btn-primary {
            padding:14px 28px; border-radius:50px; font-weight:700; font-size:1rem;
            cursor:pointer; border:none; background: var(--primary); color:#fff;
            transition: var(--transition); margin-top: 10px;
        }
        .btn-primary:hover { background: var(--primary-hover); }
        .btn-debug { background: #f59e0b; color: #000; margin-top: 8px; }
        .btn-debug:hover { background: #d97706; }
        .btn {
            padding:12px 24px; border-radius:50px; font-weight:700; font-size:0.95rem;
            cursor:pointer; border:none; transition: var(--transition);
            display:inline-flex; align-items:center; gap:6px;
        }
        .btn-next { background:var(--primary); color:#fff; }
        .btn-next:hover { background:var(--primary-hover); }
        .btn-submit { background:var(--success); color:#fff; }
        .btn-submit:hover { background:#16a34a; }
        .btn:disabled { opacity:0.5; pointer-events:none; }
        #btnPrev { background:#f1f5f9; color:var(--text); }
        #btnPrev:hover { background:#e2e8f0; }

        .exam-container {
            max-width: 850px; width: 100%;
            background: var(--card-bg); border-radius: var(--radius);
            box-shadow: 0 4px 24px rgba(0,0,0,0.08); overflow: hidden;
            display: flex; flex-direction: column;
        }
        .exam-header {
            background: linear-gradient(135deg, #00599C, #659AD2);
            color: #fff; padding: 22px 28px; display: flex; align-items: center;
            justify-content: space-between; flex-wrap: wrap; gap: 14px;
        }
        .title-area h1 { font-size:1.4rem; font-weight:700; }
        .title-area .subtitle { font-size:0.85rem; opacity:0.9; }
        .timer-box {
            background: rgba(255,255,255,0.18); border-radius: 50px;
            padding: 10px 18px; font-weight: 700; font-size: 1.1rem;
            display: flex; align-items: center; gap: 8px; backdrop-filter: blur(6px);
            transition: background 0.3s;
        }
        .timer-box.state-green { background: #22c55e; }
        .timer-box.state-yellow { background: #f59e0b; animation: pulse 0.8s infinite alternate; }
        .timer-box.state-orange { background: #f97316; animation: pulse 0.6s infinite alternate; }
        .timer-box.state-red { background: #ef4444; animation: pulse 0.5s infinite alternate; }
        @keyframes pulse { from { transform:scale(1); } to { transform:scale(1.06); } }
        .progress-wrap { padding: 14px 28px 8px; }
        .progress-info { display: flex; justify-content: space-between; font-size:0.8rem; color: var(--text-light); margin-bottom:6px; font-weight:600; }
        .progress-bar { height: 8px; background: #e2e8f0; border-radius: 20px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--primary); border-radius: 20px; width:0%; transition: width 0.4s; }
        .palette { padding: 10px 28px; display: flex; flex-wrap: wrap; gap: 4px; background: #f8fafc; border-bottom: 1px solid var(--border); max-height: 160px; overflow-y: auto; }
        .palette-btn {
            width: 30px; height: 30px; border-radius: 6px; border: 1px solid #cbd5e1;
            background: #fff; font-weight: 600; font-size: 0.75rem; cursor: pointer;
            transition: 0.2s; color: #1e293b;
        }
        .palette-btn.answered { background: #dcfce7; border-color: #22c55e; color: #166534; }
        .palette-btn.current { background: #4f6ef7; color: #fff; border-color: #4f6ef7; }
        .palette-btn.unanswered { background: #f1f5f9; color: #94a3b8; }
        .palette-btn:hover { transform: scale(1.08); }
        .exam-body { padding: 24px 28px 20px; }
        .section-header {
            background: #eef1ff; color: var(--primary); padding: 8px 14px;
            border-radius: 8px; font-weight: 700; margin-bottom: 16px;
            font-size:0.85rem; text-transform: uppercase; letter-spacing: 0.8px;
        }
        .question-text { font-size: 1.15rem; font-weight: 600; margin-bottom: 20px; line-height: 1.5; color: var(--text); }
        .options-list { list-style: none; display: flex; flex-direction: column; gap: 10px; }
        .option-item {
            display: flex; align-items: center; gap: 12px; padding: 12px 14px;
            border: 2px solid var(--border); border-radius: 12px; cursor: pointer;
            transition: var(--transition); background: #fafbfc; font-weight: 500; user-select: none;
        }
        .option-item:hover { border-color:#c4cdf9; background:#f5f7ff; }
        .option-item.selected { border-color: var(--primary); background:#eef1ff; }
        .option-radio {
            width:20px; height:20px; border-radius:50%; border:2px solid #cbd5e1;
            flex-shrink:0; display:flex; align-items:center; justify-content:center; background:#fff;
        }
        .option-item.selected .option-radio { border-color:var(--primary); background:var(--primary); }
        .option-item.selected .option-radio::after { content:''; width:7px; height:7px; background:#fff; border-radius:50%; }
        .option-label { font-weight:600; color:var(--primary); min-width:24px; }
        .option-text { flex:1; color: #1e293b; font-size: 1rem; }
        .tf-group { display:flex; gap:14px; flex-wrap:wrap; }
        .tf-btn {
            flex:1; min-width:120px; padding:16px; border:2px solid var(--border); border-radius:12px;
            text-align:center; cursor:pointer; font-weight:700; background:#fafbfc; user-select:none;
        }
        .tf-btn:hover { border-color:#c4cdf9; background:#f5f7ff; }
        .tf-btn.selected { border-color:var(--primary); background:#eef1ff; }
        .fill-input {
            width:100%; padding:14px 16px; border:2px solid var(--border); border-radius:12px;
            font-size:1rem; font-family:inherit; outline:none; background:#fafbfc;
        }
        .fill-input:focus { border-color:var(--primary); }
        .code-textarea {
            width:100%; min-height:200px; padding:14px 16px;
            border:2px solid var(--border); border-radius:12px;
            font-family: 'Courier New', monospace; font-size:0.95rem;
            outline:none; background:#fafbfc; resize:vertical;
        }
        .code-textarea:focus { border-color:var(--primary); }
        .exam-footer {
            padding:18px 28px 24px; display:flex; justify-content:space-between;
            align-items:center; gap:12px; flex-wrap:wrap; border-top:1px solid var(--border);
            background:#fdfdfd;
        }

        .results-inner {
            background: var(--card-bg); border-radius: var(--radius); box-shadow: 0 4px 24px rgba(0,0,0,0.08);
            padding: 40px; text-align: center; max-width: 700px; width: 100%;
        }
        .score-circle {
            width:140px; height:140px; border-radius:50%; margin:0 auto 20px;
            display:flex; align-items:center; justify-content:center; font-size:2.6rem; font-weight:800;
            position:relative;
            background: conic-gradient(var(--success) var(--score-percent), #e2e8f0 var(--score-percent));
        }
        .score-circle::before { content:''; position:absolute; inset:12px; background:#fff; border-radius:50%; }
        .score-circle span { position:relative; z-index:1; }
        .stats-grid { display:grid; grid-template-columns: 1fr 1fr; gap:8px; text-align:left; margin:16px 0; }
        .stat-card { background:#f8fafc; border-radius:10px; padding:12px; font-size:0.9rem; border:1px solid var(--border); }
        .email-status { margin-top: 16px; padding: 10px; border-radius: 8px; font-weight:600; }
        .email-status.success { background: #dcfce7; color: #166534; }
        .email-status.fail { background: #fef2f2; color: #991b1b; }

        .overlay {
            position: fixed; top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.85); display:flex; align-items:center; justify-content:center;
            z-index:9999; flex-direction: column; color:#fff; text-align:center;
        }
        .overlay h2 { font-size:2rem; margin-bottom:16px; }
        .overlay p { margin-bottom:24px; font-size:1.1rem; }
        .btn-warning {
            padding:12px 24px; border-radius:50px; font-weight:700; border:none;
            cursor:pointer; background: var(--warning); color:#000;
        }
    </style>

</head>

            { id:74, section:'C', type:'fill', question:'Name the operator used to access a member through a pointer.', answer:'->' },
            { id:75, section:'C', type:'fill', question:'Write the syntax for a function prototype that takes two integers and returns a float.', answer:'float func(int, int);' },
            { id:76, section:'C', type:'fill', question:'What is the default return type of a constructor?', answer:'none' },
            { id:77, section:'C', type:'fill', question:'Which loop would you use to iterate over a vector of known size?', answer:'for' },
            { id:78, section:'C', type:'fill', question:'What is the value of `5 % 2`?', answer:'1' },
            { id:79, section:'C', type:'fill', question:'Write the keyword to throw an exception.', answer:'throw' },
            { id:80, section:'C', type:'fill', question:'How do you declare an empty vector of strings?', answer:'vector<string> v;' },
            { 
                id:81, section:'D', type:'code', 
                question:'Write a complete C++ program that reads an integer from the user and prints whether it is even or odd. Include necessary headers and a main function.', 
                marks:10,
                checks: [
                    { regex: /#include\s*<iostream>/i, points: 2, msg: 'Includes <iostream>' },
                    { regex: /int\s+main\s*\(/i, points: 2, msg: 'Has int main()' },
                    { regex: /cin\s*>>/i, points: 2, msg: 'Uses cin to read input' },
                    { regex: /if\s*\(.*\)/i, points: 2, msg: 'Uses an if statement' },
                    { regex: /cout\s*<<\s*.*even|odd/i, points: 2, msg: 'Prints even or odd' }
                ]
            },
            { 
                id:82, section:'D', type:'code', 
                question:'Define a class `Rectangle` with private attributes `length` and `width`. Provide a constructor, a method `area()` that returns the area, and demonstrate its use in a `main` function.', 
                marks:10,
                checks: [
                    { regex: /class\s+Rectangle/i, points: 2, msg: 'Defines class Rectangle' },
                    { regex: /private\s*:/i, points: 1, msg: 'Uses private access specifier' },
                    { regex: /length\b/i, points: 1, msg: 'Declares length attribute' },
                    { regex: /width\b/i, points: 1, msg: 'Declares width attribute' },
                    { regex: /Rectangle\s*\([^)]*\)\s*\{/i, points: 2, msg: 'Constructor defined' },
                    { regex: /area\s*\(\)/i, points: 2, msg: 'Defines area() method' },
                    { regex: /return\s+length\s*\*\s*width/i, points: 1, msg: 'Returns area as length*width' }
                ]
            }
        ];

        const shuffleArray = arr => { for (let i = arr.length-1; i>0; i--) { const j = Math.floor(Math.random()*(i+1)); [arr[i], arr[j]] = [arr[j], arr[i]]; } };
        const QUESTIONS = [];
        const secA = QUESTIONS_POOL.filter(q => q.section==='A');
        const secB = QUESTIONS_POOL.filter(q => q.section==='B');
        const secC = QUESTIONS_POOL.filter(q => q.section==='C');
        const secD = QUESTIONS_POOL.filter(q => q.section==='D');
        shuffleArray(secA); shuffleArray(secB); shuffleArray(secC);
        let qC = 1;
        [secA, secB, secC, secD].forEach(arr => arr.forEach(q => {
            q.displayId = qC++;
            if (q.type==='mcq' && q.options) {
                const correct = q.options[q.answer];
                const idxs = q.options.map((_,i)=>i);
                shuffleArray(idxs);
                q.options = idxs.map(i=>q.options[i]);
                q.answer = q.options.indexOf(correct);
            }
            QUESTIONS.push(q);
        }));

        const TOTAL_QUESTIONS = QUESTIONS.length;
        const MAX_MARKS = 100 + secD.reduce((s,q)=>s+q.marks,0);

        const state = {
            currentIndex: 0,
            answers: new Array(TOTAL_QUESTIONS).fill(null),
            timeRemaining: CONFIG.examTime,
            timerInterval: null,
            submitted: false,
            infractions: 0,
            startTime: null,
            student: { name:'', admission:'', course:'', year:'', unit:'', email:'' },
            examActive: false
        };

        const dom = {};
        ['loginScreen','lockScreen','examContainer','warningOverlay','examBody','examFooter','resultsScreen','resultsInner','timerDisplay','timerBox','progressFill','progressLabel','answeredCount','questionPalette','btnPrev','btnNext','btnSubmit','btnLock','btnReturnFullscreen','btnLogin','infractionMsg','btnDebugTimer'].forEach(id => dom[id]=document.getElementById(id));

        const formatTime = s => { const h=Math.floor(s/3600), m=Math.floor((s%3600)/60), sec=s%60; return h>0?`${h}:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`:`${m}:${String(sec).padStart(2,'0')}`; };
        const escapeHTML = str => String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
        const norm = str => String(str).replace(/[<>]/g,'').trim().toLowerCase();
        const isAnswered = i => state.answers[i]!==null && state.answers[i]!=='';
        const isCorrect = (u,c) => Array.isArray(c)?c.some(a=>norm(u)===norm(a)):norm(u)===norm(c);

        function renderPalette() {
            let h='';
            for(let i=0;i<TOTAL_QUESTIONS;i++) {
                let cls='palette-btn';
                if(i===state.currentIndex) cls+=' current';
                else if(isAnswered(i)) cls+=' answered';
                else cls+=' unanswered';
                h+=`<button class="${cls}" data-index="${i}">${i+1}</button>`;
            }
            dom.questionPalette.innerHTML=h;
            dom.questionPalette.querySelectorAll('.palette-btn').forEach(b=>b.addEventListener('click',()=>goToQuestion(parseInt(b.dataset.index))));
        }

        function updateProgressUI() {
            const answered = state.answers.filter(a=>a!==null&&a!=='').length;
            dom.progressFill.style.width=`${(answered/TOTAL_QUESTIONS)*100}%`;
            dom.progressLabel.textContent=`Question ${state.currentIndex+1} of ${TOTAL_QUESTIONS}`;
            dom.answeredCount.textContent=`${answered} answered`;
            renderPalette();
        }

        function goToQuestion(i) { if(i<0||i>=TOTAL_QUESTIONS) return; state.currentIndex=i; renderQuestion(); }
        function updateButtons() {
            dom.btnPrev.disabled=state.currentIndex===0;
            if(state.currentIndex===TOTAL_QUESTIONS-1) { dom.btnNext.style.display='none'; dom.btnSubmit.style.display='inline-flex'; }
            else { dom.btnNext.style.display='inline-flex'; dom.btnSubmit.style.display='none'; dom.btnNext.disabled=false; }
        }
        function saveAnswer(i,v) { state.answers[i]=v; updateProgressUI(); Storage.save(); }

        function renderQuestion() {
            const q=QUESTIONS[state.currentIndex];
            const saved=state.answers[state.currentIndex];
            let h='';
            const sn = { A:'Multiple Choice (1-40)', B:'True / False (41-60)', C:'Short Answer (61-80)', D:'Practical Coding (81-82) – Auto‑Graded' };
            h+=`<div class="section-header">Section ${q.section}: ${sn[q.section]}</div>`;
            h+=`<div class="question-text">${q.displayId}. ${escapeHTML(q.question)}</div>`;
            if(q.type==='mcq') {
                h+='<ul class="options-list">';
                const labels=['A','B','C','D'];
                q.options.forEach((opt,i)=>{
                    const sel=saved===i?' selected':'';
                    h+=`<li class="option-item${sel}" data-opt-index="${i}"><div class="option-radio"></div><span class="option-label">${labels[i]}.</span><span class="option-text">${escapeHTML(opt)}</span></li>`;
                });
                h+='</ul>';
            } else if(q.type==='tf') {
                h+='<div class="tf-group">';
                [{val:true,label:'✅ True'},{val:false,label:'❌ False'}].forEach(opt=>{
                    const sel=saved===opt.val?' selected':'';
                    h+=`<div class="tf-btn${sel}" data-tf-val="${opt.val}">${opt.label}</div>`;
                });
                h+='</div>';
            } else if(q.type==='fill') {
                const val=saved!==null?saved:'';
                h+=`<input type="text" class="fill-input" id="fillInput" placeholder="Type your answer..." value="${escapeHTML(val)}" autocomplete="off">`;
            } else if(q.type==='code') {
                const val=saved!==null?saved:'';
                h+=`<textarea class="code-textarea" id="codeInput" placeholder="Write your C++ program here...">${escapeHTML(val)}</textarea>`;
                h+=`<p style="margin-top:8px;font-size:0.85rem;color:var(--text-light);">Your code will be auto‑graded based on required elements.</p>`;
            }
            dom.examBody.innerHTML=h;
            attachQuestionListeners();
            updateButtons();
            updateProgressUI();
            Storage.save();
        }

        function attachQuestionListeners() {
            const q=QUESTIONS[state.currentIndex];
            if(q.type==='mcq') {
                dom.examBody.querySelectorAll('.option-item').forEach(item=>item.addEventListener('click',function(){
                    if(state.submitted) return;
                    const idx=parseInt(this.dataset.optIndex);
                    dom.examBody.querySelectorAll('.option-item').forEach(el=>el.classList.remove('selected'));
                    this.classList.add('selected');
                    saveAnswer(state.currentIndex,idx);
                }));
            } else if(q.type==='tf') {
                dom.examBody.querySelectorAll('.tf-btn').forEach(btn=>btn.addEventListener('click',function(){
                    if(state.submitted) return;
                    const val=this.dataset.tfVal==='true';
                    dom.examBody.querySelectorAll('.tf-btn').forEach(el=>el.classList.remove('selected'));
                    this.classList.add('selected');
                    saveAnswer(state.currentIndex,val);
                }));
            } else if(q.type==='fill') {
                const input=dom.examBody.querySelector('#fillInput');
                if(input) {
                    input.addEventListener('input',function(){ if(state.submitted) return; saveAnswer(state.currentIndex,this.value.trim()); });
                    setTimeout(()=>input.focus(),100);
                }
            } else if(q.type==='code') {
                const ta=dom.examBody.querySelector('#codeInput');
                if(ta) ta.addEventListener('input',function(){ if(state.submitted) return; saveAnswer(state.currentIndex,this.value); });
            }
        }

        function showReviewScreen() {
            const answered=state.answers.filter(a=>a!==null&&a!=='').length;
            const unanswered=TOTAL_QUESTIONS-answered;
            const overlay=document.createElement('div');
            overlay.className='review-overlay';
            overlay.innerHTML=`<div class="review-card"><h3>📋 Review Your Answers</h3><p>Answered: <strong>${answered}</strong> | Unanswered: <strong style="color:#ef4444;">${unanswered}</strong></p><div class="review-list" id="reviewGrid"></div><div style="margin-top:20px;display:flex;gap:10px;justify-content:flex-end;"><button class="btn" style="background:#f1f5f9;color:var(--text);" id="reviewCancel">🔙 Continue Exam</button><button class="btn btn-submit" id="reviewConfirm">✅ Submit Final</button></div></div>`;
            document.body.appendChild(overlay);
            const grid=overlay.querySelector('#reviewGrid');
            for(let i=0;i<TOTAL_QUESTIONS;i++) {
                const btn=document.createElement('button');
                btn.textContent=i+1;
                btn.className=isAnswered(i)?'answered':'unanswered';
                btn.addEventListener('click',()=>{overlay.remove();goToQuestion(i);});
                grid.appendChild(btn);
            }
            overlay.querySelector('#reviewCancel').addEventListener('click',()=>overlay.remove());
            overlay.querySelector('#reviewConfirm').addEventListener('click',()=>{overlay.remove();App.submitExam();});
        }

        // ── TIMER with debug logging ──────────────
        const Timer = {
            updateUI() {
                dom.timerDisplay.textContent = formatTime(state.timeRemaining);
                dom.timerBox.className = 'timer-box';
                if (state.timeRemaining > 900) dom.timerBox.classList.add('state-green');
                else if (state.timeRemaining > 300) dom.timerBox.classList.add('state-yellow');
                else if (state.timeRemaining > 120) dom.timerBox.classList.add('state-orange');
                else dom.timerBox.classList.add('state-red');
            },
            start() {
                state.startTime = new Date();
                this.updateUI();
                console.log('Timer started at:', state.timeRemaining);
                state.timerInterval = setInterval(() => {
                    state.timeRemaining--;
                    console.log('Timer tick:', state.timeRemaining);  // DEBUG
                    this.updateUI();
                    Storage.save();
                    if (state.timeRemaining <= 0) {
                        clearInterval(state.timerInterval);
                        alert('⏰ Time is up!');
                        App.submitExam();
                    }
                }, 1000);
            },
            stop() { if (state.timerInterval) { clearInterval(state.timerInterval); state.timerInterval = null; } }
        };

        const Security = {
            requestFullscreen() { const el=document.documentElement; if(el.requestFullscreen) el.requestFullscreen().catch(()=>{}); else if(el.webkitRequestFullscreen) el.webkitRequestFullscreen(); else if(el.msRequestFullscreen) el.msRequestFullscreen(); },
            isFullscreen() { return !!(document.fullscreenElement || document.webkitFullscreenElement || document.msFullscreenElement); },
            blockCheating(e) { if(state.submitted||!state.examActive) return; if(['contextmenu','copy','paste','cut','dragstart','selectstart'].includes(e.type)){ e.preventDefault(); this.showWarning(); } },
            showWarning() { state.infractions++; dom.infractionMsg.textContent=`Violations: ${state.infractions}/3`; dom.warningOverlay.style.display='flex'; if(state.infractions>=3){ alert('Too many violations. Exam terminated.'); App.submitExam(); } },
            hideWarning() { dom.warningOverlay.style.display='none'; },
            init() { ['contextmenu','copy','paste','cut','dragstart','selectstart'].forEach(ev=>document.addEventListener(ev,this.blockCheating)); }
        };

        const Storage = {
            key:'cppDebugExam',
            save() { try { localStorage.setItem(this.key, JSON.stringify({ answers:state.answers, timeRemaining:state.timeRemaining, currentIndex:state.currentIndex, infractions:state.infractions, student:state.student, startTime:state.startTime?.toISOString() })); } catch(e){} },
            load() { try { const d=JSON.parse(localStorage.getItem(this.key)); if(d?.answers && d.timeRemaining!==undefined) { Object.assign(state,d); state.startTime=d.startTime?new Date(d.startTime):null; return true; } } catch(e){} return false; },
            clear() { localStorage.removeItem(this.key); }
        };

        const Email = {
            init() { try { if(typeof emailjs!=='undefined') emailjs.init(CONFIG.emailjs.publicKey); } catch(e){} },
            generateReport(scoreData) {
                const { correct, details } = scoreData;
                const percent = Math.round((correct/MAX_MARKS)*100);
                const grade = App.getGrade(percent);
                const timeUsed = CONFIG.examTime - state.timeRemaining;
                let text = `Student: ${state.student.name} | Admission: ${state.student.admission}\nCourse: ${state.student.course} | Year: ${state.student.year} | Unit: ${state.student.unit}\nEmail: ${state.student.email}\nStarted: ${state.startTime?.toLocaleTimeString()||'N/A'} | Finished: ${new Date().toLocaleTimeString()}\nDuration: ${formatTime(timeUsed)}\nBrowser: ${navigator.userAgent}\nPlatform: ${navigator.platform}\nInfractions: ${state.infractions}\nTotal Score: ${correct}/${MAX_MARKS} (${percent}%) | Grade: ${grade}\n\nAnswer Breakdown:\n`;
                details.forEach((d,i)=>{
                    const q=d.question;
                    if(q.type==='code'){
                        text+=`\n--- Code Question ${q.displayId} (${d.points}/${q.marks} marks) ---\n${q.question}\n`;
                        if(d.checks) d.checks.forEach(c=>text+=`  ${c.passed?'✅':'❌'} ${c.msg} (${c.points} pts)\n`);
                        text+=`\nSubmitted Code:\n${state.answers[i]||'No code submitted'}\n`;
                    } else {
                        const correctAns = q.type==='mcq'?q.options[q.answer]:(q.type==='tf'?(q.answer?'True':'False'):q.answer);
                        const userAnsText = d.userAnswer!==null&&d.userAnswer!==''?(q.type==='mcq'?q.options[d.userAnswer]:(q.type==='tf'?(d.userAnswer?'True':'False'):d.userAnswer)):'No answer';
                        text+=`Q${q.displayId}. ${q.question}\n   Student: ${userAnsText}\n   Correct: ${correctAns} ${d.isCorrect?'✅':'❌'}\n\n`;
                    }
                });
                return text;
            },
            async send(scoreData) {
                const statusDiv = document.getElementById('emailStatus');
                if(!statusDiv) return;
                statusDiv.textContent='📤 Sending results...'; statusDiv.className='email-status';
                try {
                    await emailjs.send(CONFIG.emailjs.serviceID, CONFIG.emailjs.templateID, {
                        student_name:state.student.name,admission:state.student.admission,course:state.student.course,year:state.student.year,unit:state.student.unit,student_email:state.student.email,
                        score:Math.round((scoreData.correct/MAX_MARKS)*100),grade:App.getGrade(Math.round((scoreData.correct/MAX_MARKS)*100)),
                        correct:scoreData.correct,wrong:MAX_MARKS-scoreData.correct,attempted:state.answers.filter(a=>a!==null&&a!=='').length,skipped:TOTAL_QUESTIONS-state.answers.filter(a=>a!==null&&a!=='').length,
                        time:formatTime(CONFIG.examTime-state.timeRemaining),infractions:state.infractions,results:this.generateReport(scoreData),
                        browser:navigator.userAgent,platform:navigator.platform,language:navigator.language,start_time:state.startTime?state.startTime.toLocaleTimeString():'',end_time:new Date().toLocaleTimeString()
                    });
                    statusDiv.textContent='✅ Results sent successfully.'; statusDiv.className='email-status success';
                } catch(e) { statusDiv.textContent='❌ Failed to send results.'; statusDiv.className='email-status fail'; }
            }
        };

        function gradeCodeQuestion(q, userCode) {
            if(!userCode||!q.checks) return { points:0, checks:[] };
            const results=[]; let total=0;
            q.checks.forEach(check=>{ const passed=check.regex.test(userCode); if(passed) total+=check.points; results.push({...check,passed}); });
            return { points:total, checks:results };
        }

        const App = {
            calculateScore() {
                let totalScore=0; const details=[];
                QUESTIONS.forEach((q,i)=>{
                    if(q.type==='code') {
                        const userCode=state.answers[i]||'';
                        const { points, checks } = gradeCodeQuestion(q,userCode);
                        totalScore+=points;
                        details.push({ question:q, userAnswer:userCode, isCorrect:false, points, checks });
                    } else {
                        const userAns=state.answers[i]; let isCorrect=false;
                        if(q.type==='mcq') isCorrect=(userAns===q.answer);
                        else if(q.type==='tf') isCorrect=(userAns===q.answer);
                        else if(q.type==='fill') { if(userAns===null||userAns==='') isCorrect=false; else isCorrect=isCorrect(userAns,q.answer); }
                        if(isCorrect) totalScore+=1;
                        details.push({ question:q, userAnswer:userAns, isCorrect });
                    }
                });
                return { correct:totalScore, total:MAX_MARKS, details };
            },
            getGrade(p) { if(p>=90) return 'A+'; if(p>=80) return 'A'; if(p>=70) return 'B'; if(p>=60) return 'C'; if(p>=50) return 'D'; return 'F'; },
            renderResults(scoreData) {
                const { correct } = scoreData;
                const percent = Math.round((correct/MAX_MARKS)*100);
                const grade = this.getGrade(percent);
                const timeUsed = CONFIG.examTime - state.timeRemaining;
                let html = `<span class="emoji-big">${percent>=90?:percent>=70?:percent>=50?:}</span>`;
                html+=`<div class="score-circle" style="--score-percent:${percent}%;"><span>${percent}%</span></div><h2>Grade: ${grade}</h2><p>You scored ${correct} out of ${MAX_MARKS} marks (${percent}%)</p>`;
                html+=`<p style="color:var(--primary);">Coding questions were automatically marked based on required elements.</p>`;
                html+=`<div class="stats-grid"><div class="stat-card">⏱ Time used: ${formatTime(timeUsed)}</div><div class="stat-card">📝 Total attempted: ${state.answers.filter(a=>a!==null&&a!=='').length}</div><div class="stat-card">✅ Marks obtained: ${correct}</div><div class="stat-card">❌ Marks lost: ${MAX_MARKS-correct}</div></div>`;
                html+=`<p style="color:#ef4444;">Infractions: ${state.infractions}</p><div id="emailStatus" class="email-status"></div><button class="btn-primary" onclick="location.reload()" style="margin-top:20px;">🔄 Retake Exam</button>`;
                dom.resultsInner.innerHTML=html;
                dom.examContainer.style.display='none';
                dom.resultsScreen.style.display='flex';
            },
            async submitExam() {
                if(state.submitted) return;
                state.submitted=true; state.examActive=false;
                Timer.stop(); Storage.clear();
                if(document.fullscreenElement) document.exitFullscreen();
                const scoreData=this.calculateScore();
                this.renderResults(scoreData);
                Email.send(scoreData);
            },
            startExam() {
                const resumed=Storage.load();
                if(!resumed||state.timeRemaining<=0||state.submitted) {
                    state.answers=new Array(TOTAL_QUESTIONS).fill(null);
                    state.timeRemaining=CONFIG.examTime;
                    state.currentIndex=0; state.infractions=0;
                    Storage.clear();
                }
                state.submitted=false; state.examActive=true;
                dom.examBody.style.display='block'; dom.examFooter.style.display='flex';
                dom.resultsScreen.style.display='none';
                document.querySelector('.progress-wrap').style.display='block';
                dom.questionPalette.style.display='flex';
                renderQuestion();
                Timer.start();
                updateProgressUI();
            },
            init() {
                Email.init(); Security.init();
                dom.btnLogin.addEventListener('click',()=>{
                    const fields=['studentName','studentAdmission','studentCourse','studentYear','studentUnit'];
                    const values=fields.map(id=>document.getElementById(id).value.trim());
                    const email=document.getElementById('studentEmail').value.trim();
                    if(values.some(v=>!v)){ alert('Please fill all required fields.'); return; }
                    state.student={ name:values[0],admission:values[1],course:values[2],year:values[3],unit:values[4],email };
                    dom.loginScreen.style.display='none'; dom.lockScreen.style.display='flex';
                    Storage.save();
                });
                dom.btnLock.addEventListener('click',()=>{ Security.requestFullscreen(); dom.lockScreen.style.display='none'; dom.examContainer.style.display='flex'; App.startExam(); });
                // Debug timer button – starts timer without the exam
                dom.btnDebugTimer.addEventListener('click',()=>{
                    console.log('Debug timer button clicked. Starting timer directly...');
                    state.examActive = false; // no exam, just timer
                    dom.loginScreen.style.display='none';
                    dom.lockScreen.style.display='none';
                    dom.examContainer.style.display='flex';
                    dom.examBody.style.display='none'; // hide questions
                    dom.examFooter.style.display='none';
                    Timer.start(); // start timer only
                    alert('Timer started – check console for ticks. Look at the top right for countdown.');
                });
                dom.btnReturnFullscreen.addEventListener('click',()=>{ Security.requestFullscreen(); Security.hideWarning(); });
                dom.btnPrev.addEventListener('click',()=>{ if(state.currentIndex>0) goToQuestion(state.currentIndex-1); });
                dom.btnNext.addEventListener('click',()=>{ if(state.currentIndex<TOTAL_QUESTIONS-1) goToQuestion(state.currentIndex+1); });
                dom.btnSubmit.addEventListener('click',showReviewScreen);
            }
        };

        window.addEventListener('DOMContentLoaded', ()=> App.init() );
    })();
    </script>
</body>
</html>
